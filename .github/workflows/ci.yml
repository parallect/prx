name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Unit tests
        run: uv run pytest tests/ --ignore=tests/e2e -x -q

      - name: E2E tests (real binary + fake hub)
        run: uv run pytest tests/e2e -v
        env:
          # Ensure the subprocess-under-test can't accidentally reach a
          # real prxhub, even if a test forgets to set PRX_PRXHUB_URL.
          PRX_PRXHUB_URL: http://127.0.0.1:1
          NO_COLOR: "1"
